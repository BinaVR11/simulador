<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hand Tracking WebAR</title>

<style>

html,body{
margin:0;
overflow:hidden;
background:black;
}

video{
position:absolute;
width:100vw;
height:100vh;
object-fit:cover;
transform:scaleX(-1);
}

canvas{
position:absolute;
width:100vw;
height:100vh;
pointer-events:none;
}

</style>

</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script type="module">

import * as tf from "https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js";

import * as handPoseDetection from "https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection";

import "https://cdn.jsdelivr.net/npm/@mediapipe/hands";

const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const stream=await navigator.mediaDevices.getUserMedia({

video:{
facingMode:"environment"
}

});

video.srcObject=stream;

await new Promise(r=>video.onloadedmetadata=r);

await tf.ready();

const detector=await handPoseDetection.createDetector(

handPoseDetection.SupportedModels.MediaPipeHands,

{

runtime:"mediapipe",

modelType:"full",

solutionPath:"https://cdn.jsdelivr.net/npm/@mediapipe/hands"

}

);

async function render(){

ctx.clearRect(0,0,canvas.width,canvas.height);

const hands=await detector.estimateHands(video);

ctx.drawImage(video,0,0,canvas.width,canvas.height);

ctx.fillStyle="lime";

ctx.strokeStyle="cyan";

ctx.lineWidth=3;

for(const hand of hands){

for(const point of hand.keypoints){

const x=(point.x/video.videoWidth)*canvas.width;

const y=(point.y/video.videoHeight)*canvas.height;

ctx.beginPath();

ctx.arc(canvas.width-x,y,6,0,Math.PI*2);

ctx.fill();

}

}

requestAnimationFrame(render);

}

render();

</script>

</body>
</html>
