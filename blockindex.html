<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WebXR & Simulador AR: Construcción</title>
    <!-- Tailwind CSS para asegurar que la UI no falle -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #0a0a16; font-family: monospace; }
        canvas { display: block; position: absolute; top:0; left:0; width:100%; height:100%; z-index: 1; }
        .safe-bottom { padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
    </style>
</head>
<body>

    <!-- UI HOLOGRÁFICA SUPERPUESTA -->
    <div id="ui-overlay" class="absolute inset-0 z-10 pointer-events-none flex flex-col justify-between p-6 safe-bottom">
        
        <!-- Header: Telemetría -->
        <div class="flex justify-between items-start w-full">
            <div class="bg-black/70 backdrop-blur-md border border-cyan-500/30 p-3 rounded-xl text-xs text-cyan-400 shadow-lg shadow-cyan-500/10">
                <div class="flex items-center gap-2">
                    <span id="status-indicator" class="w-2 height-2 rounded-full bg-amber-500 animate-pulse"></span>
                    <span id="xr-status">INICIALIZANDO...</span>
                </div>
                <div id="telemetry-details" class="mt-1 text-slate-400 text-[10px]">Modo: Comprobando sistema</div>
            </div>
            
            <div id="block-counter" class="bg-black/70 backdrop-blur-md border border-emerald-500/30 p-3 rounded-xl text-right text-xs text-emerald-400">
                <div>PROGRESO DE MURO</div>
                <div id="counter-txt" class="font-bold text-sm mt-0.5">0 / 0 Bloques</div>
            </div>
        </div>

        <!-- Centro: Retícula / Guía Visual de Escaneo -->
        <div id="scan-reticle-ui" class="m-auto flex flex-col items-center justify-center text-center transition-all duration-500">
            <div class="w-16 h-16 border-2 border-dashed border-cyan-400 rounded-full animate-spin [animation-duration:10s] flex items-center justify-center">
                <div class="w-2 h-2 bg-cyan-400 rounded-full"></div>
            </div>
            <p id="guide-text" class="text-white text-xs tracking-widest mt-4 bg-black/50 px-3 py-1 rounded-md backdrop-blur-sm border border-white/10">
                ESCANEANDO ENTORNO...
            </p>
        </div>

        <!-- Footer: Instrucciones y Progreso -->
        <div class="w-full max-w-md mx-auto pointer-events-auto flex flex-col items-center gap-3">
            <div class="w-full bg-black/80 backdrop-blur-xl border border-white/10 p-4 rounded-2xl shadow-2xl text-center">
                <div class="w-full bg-white/10 h-1.5 rounded-full overflow-hidden mb-3">
                    <div id="ar-progress-inner" class="h-full bg-gradient-to-r from-cyan-400 to-emerald-400 w-0 transition-all duration-300"></div>
                </div>
                <p id="action-instruction" class="text-slate-300 text-xs">
                    Cargando módulos de visión artificial...
                </p>
            </div>
            
            <!-- Botón de Control (El script nativo de Three.js se inyectará aquí o usará este) -->
            <button id="ar-btn-trigger" class="w-full py-3.5 bg-gradient-to-r from-cyan-500 to-blue-600 text-white rounded-xl font-bold tracking-wider text-sm shadow-xl shadow-cyan-500/20 active:scale-95 transition-all uppercase">
                Iniciar Modo Simulación
            </button>
        </div>
    </div>

    <!-- SCRIPTS CORE -->
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.150.0/build/three.module.js",
            "three/examples/jsm/webxr/ARButton.js": "https://unpkg.com/three@0.150.0/examples/jsm/webxr/ARButton.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/examples/jsm/webxr/ARButton.js';

        // Elementos de la UI
        const xrStatus = document.getElementById('xr-status');
        const statusIndicator = document.getElementById('status-indicator');
        const telemetryDetails = document.getElementById('telemetry-details');
        const counterTxt = document.getElementById('counter-txt');
        const guideText = document.getElementById('guide-text');
        const actionInstruction = document.getElementById('action-instruction');
        const arProgressInner = document.getElementById('ar-progress-inner');
        const arBtnTrigger = document.getElementById('ar-btn-trigger');
        const scanReticleUi = document.getElementById('scan-reticle-ui');

        // Three.js & Config
        let scene, camera, renderer, hitTestSource = null, hitTestSourceRequested = false;
        let surfacePlaneFound = false, isFallbackMode = false;
        
        // Muro de Ladrillos
        const brickGroup = new THREE.Group();
        let wallBricks = [];
        let currentBuildIdx = 0;
        const wallConfig = { rows: 7, cols: 6, bWidth: 0.2, bHeight: 0.08, bDepth: 0.06, mortar: 0.008 };

        // Referencia para modo simulado sin AR real
        let dummyGrid, dummyReticle;

        init();

        function init() {
            // 1. Configurar Escena Básica
            scene = new THREE.Scene();

            // 2. Configurar Cámara
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
            camera.position.set(0, 0.6, 1.2); // Posición inicial por si entra en modo PC

            // 3. Renderizador con Canal Alfa (Transparencia para la cámara real)
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // 4. Luces Estilizadas
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0x00ffff, 0.8); // Luz cian futurista
            dirLight.position.set(1, 3, 1);
            scene.add(dirLight);

            const warmLight = new THREE.DirectionalLight(0xe07b39, 0.5); // Reflejo terracota
            warmLight.position.set(-1, 1, 0.5);
            scene.add(warmLight);

            // Añadir grupo del muro a la escena
            scene.add(brickGroup);

            // 5. Generar Estructura Matemática de los Ladrillos
            buildWallStructure();

            // 6. Verificar Compatibilidad Física Real de WebXR
            checkXRSupport();

            // 7. Eventos de interacción
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('pointerdown', handleUserInteraction);

            // Iniciar ciclo de renderizado nativo de WebXR
            renderer.setAnimationLoop(renderLoop);
        }

        function checkXRSupport() {
            // Verificar contexto seguro HTTPS
            if (window.location.protocol !== 'https:' && window.location.hostname !== 'localhost') {
                setupFallbackMode("Falta HTTPS (Seguridad Obligatoria)");
                return;
            }

            if ('xr' in navigator) {
                navigator.xr.isSessionSupported('immersive-ar')
                    .then((supported) => {
                        if (supported) {
                            activateRealARMode();
                        } else {
                            setupFallbackMode("Dispositivo no soporta ARCore/WebXR");
                        }
                    })
                    .catch(() => setupFallbackMode("Error de entorno XR"));
            } else {
                setupFallbackMode("Navegador sin API WebXR");
            }
        }

        function activateRealARMode() {
            xrStatus.innerText = "RA LISTA";
            statusIndicator.className = "w-2 h-2 rounded-full bg-emerald-400 animate-pulse";
            telemetryDetails.innerText = "Modo: WebXR Immersive-AR (Cámara Real)";
            actionInstruction.innerText = "Presiona 'INICIAR REALIDAD AUMENTADA' y escanea tu piso.";

            // Configurar el disparador nativo de Three.js sobre nuestro botón táctil
            const options = {
                requiredFeatures: ['hit-test'],
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: document.getElementById('ui-overlay') }
            };

            // Creamos el botón nativo invisiblemente y transferimos su click
            const nativeArBtn = ARButton.createButton(renderer, options);
            arBtnTrigger.innerText = "Iniciar Realidad Aumentada";
            arBtnTrigger.addEventListener('click', () => {
                nativeArBtn.click(); 
                arBtnTrigger.style.display = 'none'; // Ocultar al iniciar sesión
            });

            renderer.xr.addEventListener('sessionstart', () => {
                scanReticleUi.style.opacity = '1';
                guideText.innerText = "MUEVE EL CELULAR DE LADO A LADO MIRANDO AL SUELO";
                actionInstruction.innerText = "Buscando una superficie plana horizontal...";
            });

            renderer.xr.addEventListener('sessionend', () => {
                arBtnTrigger.style.display = 'block';
                surfacePlaneFound = false;
                resetWallProgress();
            });
        }

        function setupFallbackMode(reason) {
            isFallbackMode = true;
            xrStatus.innerText = "MODO SIMULADOR 3D";
            statusIndicator.className = "w-2 h-2 rounded-full bg-blue-400";
            telemetryDetails.innerText = `Razón: ${reason}`;
            actionInstruction.innerText = "Haciendo clic o tocando cualquier parte de la pantalla levantarás el muro.";
            arBtnTrigger.innerText = "Ejecutando en Modo Sandbox";
            arBtnTrigger.disabled = true;
            arBtnTrigger.className = "w-full py-3 bg-slate-800 text-slate-500 rounded-xl font-bold text-xs border border-slate-700 cursor-not-allowed uppercase";

            // Crear un suelo virtual de cuadrícula cibernética para que no se vea negro
            dummyGrid = new THREE.GridHelper(10, 20, 0x00f3ff, 0x1e293b);
            dummyGrid.position.y = -0.5;
            scene.add(dummyGrid);

            // Crear un retículo visual simulado en el centro del suelo
            const reticleGeo = new THREE.RingGeometry(0.08, 0.1, 32);
            reticleGeo.rotateX(-Math.PI / 2);
            const reticleMat = new THREE.MeshBasicMaterial({ color: 0x00f3ff, side: THREE.DoubleSide });
            dummyReticle = new THREE.Mesh(reticleGeo, reticleMat);
            dummyReticle.position.set(0, -0.49, -0.5);
            scene.add(dummyReticle);

            // Posicionar el grupo del muro directamente en el suelo virtual
            brickGroup.position.set(0, -0.5, -0.5);
            surfacePlaneFound = true; // Activar simulación directa
            guideText.innerText = "SISTEMA VIRTUAL ACTIVO";
        }

        function buildWallStructure() {
            const fullW = wallConfig.cols * (wallConfig.bWidth + wallConfig.mortar);
            let globalIdx = 0;

            const brickMat = new THREE.MeshPhongMaterial({ 
                color: 0xe07b39, 
                flatShading: true,
                shininess: 10
            });

            for (let r = 0; r < wallConfig.rows; r++) {
                const isOdd = (r % 2 !== 0);
                const colsInRow = isOdd ? wallConfig.cols - 1 : wallConfig.cols;
                const offsetShift = isOdd ? (wallConfig.bWidth / 2) : 0;

                // Ladrillo inicial izquierdo (Mitad si es fila impar)
                if (isOdd) {
                    createBrickElement(-fullW/2 + wallConfig.bWidth/4, r, true, globalIdx++, brickMat);
                }

                // Ladrillos estándar intermedios
                for (let c = 0; c < colsInRow; c++) {
                    const x = -fullW/2 + offsetShift + c * (wallConfig.bWidth + wallConfig.mortar) + (wallConfig.bWidth / 2);
                    createBrickElement(x, r, false, globalIdx++, brickMat);
                }

                // Ladrillo final derecho (Mitad si es fila impar)
                if (isOdd) {
                    createBrickElement(fullW/2 - wallConfig.bWidth/4, r, true, globalIdx++, brickMat);
                }
            }
            counterTxt.innerText = `0 / ${wallBricks.length} Bloques`;
        }

        function createBrickElement(x, r, isHalf, idx, material) {
            const w = isHalf ? (wallConfig.bWidth / 2) - wallConfig.mortar : wallConfig.bWidth;
            const geom = new THREE.BoxGeometry(w, wallConfig.bHeight - wallConfig.mortar, wallConfig.bDepth);
            
            const mesh = new THREE.Mesh(geom, material.clone());
            mesh.scale.set(0.001, 0.001, 0.001); // Escondido al inicio

            const yFinal = r * (wallConfig.bHeight + wallConfig.mortar) + (wallConfig.bHeight / 2);

            wallBricks.push({
                mesh: mesh,
                active: false,
                spawnTime: 0,
                x: x, y: yFinal, z: 0
            });
        }

        function handleUserInteraction(e) {
            // Evitar clics accidentales si la superficie física real no está lista en WebXR
            if (!surfacePlaneFound) return;

            if (currentBuildIdx < wallBricks.length) {
                const targetBrick = wallBricks[currentBuildIdx];
                brickGroup.add(targetBrick.mesh); // Añadir al contenedor
                targetBrick.active = true;
                targetBrick.spawnTime = performance.now();

                currentBuildIdx++;
                
                // Actualizar interfaz
                const progress = currentBuildIdx / wallBricks.length;
                arProgressInner.style.width = `${progress * 100}%`;
                counterTxt.innerText = `${currentBuildIdx} / ${wallBricks.length} Bloques`;
                
                if(currentBuildIdx === wallBricks.length) {
                    actionInstruction.innerText = "¡Muro completado exitosamente!";
                    guideText.innerText = "ESTRUCTURA CONSTRUIDA";
                } else {
                    actionInstruction.innerText = "Sigue tocando para seguir levantando hiladas.";
                }
            }
        }

        function resetWallProgress() {
            currentBuildIdx = 0;
            arProgressInner.style.width = "0%";
            counterTxt.innerText = `0 / ${wallBricks.length} Bloques`;
            wallBricks.forEach(b => {
                b.active = false;
                brickGroup.remove(b.mesh);
                b.mesh.scale.set(0.001, 0.001, 0.001);
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function renderLoop(timestamp, frame) {
            // 1. Detección de Superficie mediante la API WebXR Hit Test
            if (frame && !isFallbackMode) {
                const session = renderer.xr.getSession();
                if (!hitTestSourceRequested && session) {
                    session.requestReferenceSpace('viewer').then((space) => {
                        session.requestHitTestSource({ space: space }).then((source) => {
                            hitTestSource = source;
                        });
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const referenceSpace = renderer.xr.getReferenceSpace();
                    const hitTestResults = frame.getHitTestResults(hitTestSource);

                    if (hitTestResults.length > 0) {
                        const hit = hitTestResults[0];
                        const pose = hit.getPose(referenceSpace);

                        if (pose) {
                            if (!surfacePlaneFound) {
                                surfacePlaneFound = true;
                                scanReticleUi.style.opacity = '0.3'; // Atenuar círculo de escaneo
                                guideText.innerText = "¡SUPERFICIE FIJADA!";
                                actionInstruction.innerText = "TOCA CUALQUIER PARTE DE LA PANTALLA PARA PONER UN LADRILLO";
                            }
                            // Mover el punto de anclaje del muro a las coordenadas del piso real detectado
                            const matrix = new THREE.Matrix4().fromArray(pose.transform.matrix);
                            brickGroup.matrix.copy(matrix);
                            brickGroup.matrixAutoUpdate = false;
                        }
                    }
                }
            }

            // 2. Rotación leve de la cámara en modo Sandbox de PC para dar tridimensionalidad
            if (isFallbackMode) {
                const time = timestamp * 0.0005;
                camera.position.x = Math.sin(time * 0.5) * 0.3;
                camera.lookAt(0, -0.1, -0.5);
            }

            // 3. Animación Interpolada de los Ladrillos (Efecto Caída Amortiguada)
            const duration = 600; // milisegundos de animación
            const dropOffset = 0.4; // cae desde 40 cm arriba

            wallBricks.forEach(brick => {
                if (brick.active) {
                    const elapsed = timestamp - brick.spawnTime;
                    const progress = Math.min(elapsed / duration, 1);
                    
                    // Curva matemática de Rebote Elástico (Ease Out Bounce)
                    const bounceProgress = easeOutBounce(progress);

                    // Interpolación posicional vertical
                    const currentY = brick.y + (dropOffset * (1 - bounceProgress));
                    brick.mesh.position.set(brick.x, currentY, brick.z);

                    // Interpolación de tamaño
                    const scaleFactor = Math.min(1, bounceProgress * 1.3);
                    brick.mesh.scale.set(scaleFactor, scaleFactor, scaleFactor);

                    // Efecto de transmutación de color holográfico a terracota
                    if (progress < 0.25) {
                        brick.mesh.material.color.setHex(0x00f3ff); // Pulso Neón inicial
                    } else {
                        brick.mesh.material.color.lerp(new THREE.Color(0xe07b39), (progress - 0.25) * 1.3);
                    }
                }
            });

            renderer.render(scene, camera);
        }

        // Función matemática pura para simular física de rebotes elásticos sin motor externo
        function easeOutBounce(x) {
            const n1 = 7.5625;
            const d1 = 2.75;
            if (x < 1 / d1) {
                return n1 * x * x;
            } else if (x < 2 / d1) {
                return n1 * (x -= 1.5 / d1) * x + 0.75;
            } else if (x < 2.5 / d1) {
                return n1 * (x -= 2.25 / d1) * x + 0.9375;
            } else {
                return n1 * (x -= 2.625 / d1) * x + 0.984375;
            }
        }
    </script>
</body>
</html>
