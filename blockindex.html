<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebXR: Detección de Superficies y Construcción de Muro</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        canvas { display: block; }

        /* UI de Instrucciones y Estado */
        #ui-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
            color: white; font-family: monospace; text-shadow: 0 1px 3px rgba(0,0,0,0.8);
            z-index: 10; padding-bottom: calc(20px + env(safe-area-inset-bottom));
        }

        #xr-status {
            background-color: rgba(0, 200, 100, 0.7);
            color: #000; padding: 8px 16px; border-radius: 20px;
            font-weight: bold; font-size: 14px;
            margin-bottom: 10px;
            box-shadow: 0 2px 10px rgba(0, 200, 100, 0.5);
            backdrop-filter: blur(5px);
        }

        #ui-instructions {
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 200, 0.2);
            border-radius: 12px;
            padding: 20px 30px;
            text-align: center;
            max-width: 80%;
            box-shadow: 0 4px 20px rgba(0, 255, 200, 0.2);
            transition: opacity 0.5s ease;
        }

        #ui-instructions h1 { margin: 0 0 10px; font-size: 1.5rem; color: #0fcc8; }
        #ui-instructions p { margin: 0 0 15px; font-size: 1rem; color: #a0aec0; }
        #ar-progress-bar { width: 100%; height: 4px; background-color: rgba(255,255,255,0.1); border-radius: 2px; position: relative; overflow: hidden; }
        #ar-progress-inner { position: absolute; left: 0; top: 0; height: 100%; background: linear-gradient(90deg, #0fcc8, #00f3ff); width: 0%; transition: width 0.3s ease; }

        /* Botón de AR */
        #ar-button {
            position: absolute;
            bottom: 30px; left: 50%; transform: translateX(-50%);
            padding: 12px 24px; background: linear-gradient(135deg, #0fcc8, #00f3ff);
            color: white; border: none; border-radius: 30px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 255, 200, 0.4);
            transition: all 0.2s ease;
            text-transform: uppercase; letter-spacing: 1px;
        }

        #ar-button:hover { box-shadow: 0 6px 20px rgba(0, 255, 200, 0.6); transform: translateX(-50%) translateY(-2px); }
        #ar-button:disabled { background: #555; cursor: not-allowed; box-shadow: none; color: #aaa; }

    </style>
</head>
<body>

    <button id="ar-button">Cargando...</button>

    <div id="ui-overlay">
        <div id="xr-status">WebXR No Disponible</div>
        <div id="ui-instructions">
            <h1>WebXR Hit Testing</h1>
            <p>1. Permite acceso a la cámara. <br> 2. Mueve lentamente tu dispositivo para escanear el suelo. <br> 3. Toca la pantalla cuando detecte la superficie.</p>
            <div id="ar-progress-bar">
                <div id="ar-progress-inner"></div>
            </div>
        </div>
    </div>

    <!-- Scripts de Three.js (Import Map y CDN) -->
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.150.0/build/three.module.js",
            "three/examples/jsm/loaders/GLTFLoader.js": "https://unpkg.com/three@0.150.0/examples/jsm/loaders/GLTFLoader.js",
            "three/examples/jsm/webxr/ARButton.js": "https://unpkg.com/three@0.150.0/examples/jsm/webxr/ARButton.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/examples/jsm/webxr/ARButton.js';

        // Variables principales de la Escena y XR
        let container, camera, scene, renderer, arButtonElement;
        let xrStatus, uiInstructions, arProgressInner;

        // Variables de Detección de Superficie y Lógica
        let hitTestSource = null;
        let hitTestSourceRequested = false;
        let surfacePlaneFound = false;

        // Variables de Construcción de Muro
        const brickGroup = new THREE.Group();
        const wallBricks = [];
        const wallDimensions = { width: 1.2, height: 0.8, depth: 0.05, rows: 8, cols: 6 };
        const brickSize = { width: 0.2, height: 0.1, depth: 0.05, mortar: 0.01 };
        let buildProgress = 0; // 0.0 a 1.0
        let currentBuildIdx = 0;

        init();
        animate();

        function init() {
            container = document.createElement('div');
            document.body.appendChild(container);

            // 1. Configurar Escena
            scene = new THREE.Scene();

            // 2. Configurar Cámara
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            // 3. Configurar Renderizado Transparente para AR
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true; // Activar WebXR
            container.appendChild(renderer.domElement);

            // 4. Luces (Iluminación para AR)
            const light1 = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
            light1.position.set(0.5, 1, 0.25);
            scene.add(light1);

            const light2 = new THREE.DirectionalLight(0xffffff, 0.5);
            light2.position.set(0.5, 3, 0.25);
            light2.castShadow = true;
            scene.add(light2);

            // 5. Configurar Botón WebXR y Estado de la UI
            arButtonElement = document.getElementById('ar-button');
            xrStatus = document.getElementById('xr-status');
            uiInstructions = document.getElementById('ui-instructions');
            arProgressInner = document.getElementById('ar-progress-inner');

            checkXRCompatibility();

            // 6. Configurar Interacción de Toque (para WebXR)
            renderer.xr.addEventListener('sessionstart', onXRSessionStart);
            renderer.xr.addEventListener('sessionend', onXRSessionEnd);

            // La construcción se inicia con un toque después de encontrar el suelo
            window.addEventListener('touchstart', onTouchStart, false);

            // 7. Preparar la estructura del Muro (pero no renderizarlo todavía)
            generateWallGeometry();

            // 8. Event Listener para Redimensionado
            window.addEventListener('resize', onWindowResize);
        }

        function checkXRCompatibility() {
            if ('xr' in navigator) {
                navigator.xr.isSessionSupported('immersive-ar').then((supported) => {
                    if (supported) {
                        xrStatus.innerText = 'WebXR AR Disponible';
                        xrStatus.style.backgroundColor = 'rgba(0, 200, 100, 0.7)';
                        setupARButton();
                    } else {
                        xrStatus.innerText = 'Immersive-AR no soportado';
                        xrStatus.style.backgroundColor = 'rgba(200, 50, 50, 0.7)';
                        arButtonElement.innerText = 'AR NO DISPONIBLE';
                        arButtonElement.disabled = true;
                    }
                });
            } else {
                xrStatus.innerText = 'WebXR no detectado';
                xrStatus.style.backgroundColor = 'rgba(200, 50, 50, 0.7)';
                arButtonElement.innerText = 'NAVEGADOR INCOMPATIBLE';
                arButtonElement.disabled = true;
            }
        }

        function setupARButton() {
            // El módulo ARButton crea su propio botón, pero lo vincularemos al nuestro
            const arButton = ARButton.createButton(renderer, {
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: document.getElementById('ui-overlay') },
                requiredFeatures: ['hit-test'] // Requerido para la detección de superficies
            });

            // Reemplazar nuestro botón por el nativo de ARButton
            arButtonElement.style.display = 'none'; // Ocultar el nuestro
            document.body.appendChild(arButton); // Añadir el nativo (ya gestiona el texto y click)
            arButton.id = 'webxr-native-button'; // ID para estilo si es necesario (heredará estilos básicos)
            arButton.style.cssText = arButtonElement.style.cssText; // Copiar estilos visibles
            arButton.style.display = 'block'; // Mostrar el nativo
        }

        function onXRSessionStart() {
            uiInstructions.style.opacity = '1';
            // Resetear el progreso
            buildProgress = 0;
            currentBuildIdx = 0;
            updateBuildUI();
        }

        function onXRSessionEnd() {
            uiInstructions.style.opacity = '0';
            hitTestSource = null;
            hitTestSourceRequested = false;
            surfacePlaneFound = false;

            // Limpiar escena del muro si cerramos AR
            scene.remove(brickGroup);
            while (brickGroup.children.length > 0) {
                const child = brickGroup.children[0];
                brickGroup.remove(child);
                child.geometry.dispose();
                child.material.dispose();
            }
            buildProgress = 0;
            updateBuildUI();
        }

        function onTouchStart() {
            if (!surfacePlaneFound || !renderer.xr.isPresenting) return;

            // Iniciar la construcción paso a paso con cada toque
            if (currentBuildIdx < wallBricks.length) {
                // Añadir el siguiente ladrillo a la escena
                scene.add(wallBricks[currentBuildIdx].mesh);
                wallBricks[currentBuildIdx].active = true;
                wallBricks[currentBuildIdx].buildTime = performance.now();

                currentBuildIdx++;
                buildProgress = currentBuildIdx / wallBricks.length;
                updateBuildUI();

                // Sonido sintético simple (opcional)
                const oscillator = renderer.domElement.getContext('webgl2').canvas.parentElement.parentElement.getWebGL2Context().createOscillator();
                // (Esto es complejo de sintetizar sin audio API, mejor omitir para simplicidad)
            }
        }

        function updateBuildUI() {
            arProgressInner.style.width = `${buildProgress * 100}%`;
            xrStatus.innerText = `Construido: ${Math.round(buildProgress * 100)}% (${currentBuildIdx}/${wallBricks.length} bloques)`;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            renderer.setAnimationLoop(render); // WebXR requiere esta forma de renderizado
        }

        function render(timestamp, frame) {
            if (frame) {
                // Lógica de Detección de Superficie
                detectSurfaceWithHitTest(frame);
            }

            // Animar la aparición de ladrillos
            animateBrickAppearance(timestamp);

            renderer.render(scene, camera);
        }

        // Lógica de WebXR Hit Testing para encontrar el plano horizontal
        function detectSurfaceWithHitTest(frame) {
            const session = renderer.xr.getSession();

            // Referencia de espacio local (suelo de la experiencia)
            if (hitTestSourceRequested === false) {
                session.requestReferenceSpace('viewer').then((referenceSpace) => {
                    session.requestHitTestSource({ space: referenceSpace }).then((source) => {
                        hitTestSource = source;
                    });
                });
                hitTestSourceRequested = true;
            }

            // Si ya tenemos el source, buscar impacto
            if (hitTestSource) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const hitTestResults = frame.getHitTestResults(hitTestSource);

                if (hitTestResults.length) {
                    const hit = hitTestResults[0]; // Primer punto de impacto

                    // Obtener la pose del impacto (posición y orientación de la superficie detectada)
                    const pose = hit.getPose(referenceSpace);

                    if (pose) {
                        // El plano de superficie se ha encontrado
                        if (!surfacePlaneFound) {
                            surfacePlaneFound = true;
                            xrStatus.innerText = 'Superficie Detectada (Toca para construir)';
                            xrStatus.style.backgroundColor = 'rgba(0, 150, 255, 0.7)';
                            uiInstructions.querySelector('h1').innerText = 'Superficie Encontrada!';
                            uiInstructions.querySelector('p').innerText = 'Un muro se construirá sobre este plano. Toca la pantalla repetidamente.';
                        }

                        // Guardar la matriz de transformación del plano (donde anclaremos el muro)
                        // pose.transform.matrix es la posición y orientación de la superficie real
                        const surfaceMatrix = new THREE.Matrix4().fromArray(pose.transform.matrix);
                        brickGroup.matrix.copy(surfaceMatrix);
                        brickGroup.matrixAutoUpdate = false; // El muro se ancla a esta matriz
                    }
                }
            }
        }

        // Lógica de Generación de la Estructura del Muro (sin renderizar)
        function generateWallGeometry() {
            // Material terracota "constructivo"
            const material = new THREE.MeshPhongMaterial({ color: 0xe07b39, flatShading: true });
            const geometry = new THREE.BoxGeometry(brickSize.width - brickSize.mortar, brickSize.height - brickSize.mortar, brickSize.depth);

            scene.add(brickGroup); // Añadir el grupo contenedor a la escena, pero sin ladrillos visibles

            let globalIdx = 0;
            const fullBrickX = brickSize.width + brickSize.mortar;
            const fullBrickY = brickSize.height + brickSize.mortar;

            for (let row = 0; row < wallDimensions.rows; row++) {
                // Aparejo a soga: desfase en filas impares
                const rowDesfase = (row % 2 !== 0) ? (brickSize.width / 2) : 0;
                const activeCols = (row % 2 !== 0) ? (wallDimensions.cols - 1) : wallDimensions.cols;

                // Añadir medio ladrillo al inicio si hay desfase
                if (row % 2 !== 0) {
                    addBrick( - (wallDimensions.width / 2) + (brickSize.width/4), (row * fullBrickY) + (brickSize.height / 2), 0, row, globalIdx, true); // Medio ladrillo
                    globalIdx++;
                }

                for (let col = 0; col < activeCols; col++) {
                    const x = - (wallDimensions.width / 2) + rowDesfase + (col * fullBrickX) + (brickSize.width / 2);
                    const y = (row * fullBrickY) + (brickSize.height / 2);

                    addBrick(x, y, 0, row, globalIdx, false);
                    globalIdx++;
                }

                // Añadir medio ladrillo al final si hay desfase
                if (row % 2 !== 0) {
                    addBrick( (wallDimensions.width / 2) - (brickSize.width/4), (row * fullBrickY) + (brickSize.height / 2), 0, row, globalIdx, true); // Medio ladrillo
                    globalIdx++;
                }
            }

            function addBrick(x, y, z, row, idx, isHalf) {
                // Geometría única para medios ladrillos si aplica
                let brickGeom = geometry;
                if (isHalf) {
                    brickGeom = new THREE.BoxGeometry((brickSize.width / 2) - brickSize.mortar, brickSize.height - brickSize.mortar, brickSize.depth);
                }

                const mesh = new THREE.Mesh(brickGeom, material.clone());
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                mesh.scale.set(0.01, 0.01, 0.01); // Iniciar oculto (casi sin escala)

                // Guardar la posición final pero no aplicarla todavía
                const targetPos = new THREE.Vector3(x, y, z);

                // Almacenar datos del ladrillo para la animación
                wallBricks.push({
                    mesh: mesh,
                    active: false,
                    buildTime: 0,
                    finalX: x, finalY: y, finalZ: z,
                    finalScale: new THREE.Vector3(1, 1, 1)
                });
            }
        }

        // Lógica de Animación de Aparición (Caída + Rebote)
        function animateBrickAppearance(timestamp) {
            if (!renderer.xr.isPresenting) return;

            const animationDuration = 800; // ms por ladrillo
            const fallHeight = 0.3; // metros desde arriba

            wallBricks.forEach(brick => {
                if (brick.active) {
                    const elapsed = timestamp - brick.buildTime;
                    const progress = Math.min(elapsed / animationDuration, 1);

                    // Función de rebote (easeOutBounce) para la posición Y
                    const easedProgress = easeOutBounce(progress);

                    // Animar la caída desde Y + fallHeight hasta Y final
                    const animY = brick.finalY + (fallHeight * (1 - easedProgress));
                    brick.mesh.position.set(brick.finalX, animY, brick.finalZ);

                    // Animar escala para que "brote"
                    const currentScale = Math.min(1, easedProgress * 1.5);
                    brick.mesh.scale.set(currentScale, currentScale, currentScale);

                    // Añadir un destello inicial holográfico
                    if (progress < 0.2) {
                        brick.mesh.material.color.setHex(0x00f3ff); // Cian holográfico
                    } else if (progress < 0.5) {
                        brick.mesh.material.color.setHex(0x0fcc8); // Verde constructivo
                    } else {
                        // Volver al terracota original poco a poco
                        brick.mesh.material.color.lerp(new THREE.Color(0xe07b39), progress);
                    }
                }
            });
        }

        // Función matemática para simular rebote físico
        function easeOutBounce(x) {
            const n1 = 7.5625;
            const d1 = 2.75;
            if (x < 1 / d1) {
                return n1 * x * x;
            } else if (x < 2 / d1) {
                return n1 * (x -= 1.5 / d1) * x + 0.75;
            } else if (x < 2.5 / d1) {
                return n1 * (x -= 2.25 / d1) * x + 0.9375;
            } else {
                return n1 * (x -= 2.625 / d1) * x + 0.984375;
            }
        }

    </script>
</body>
</html>
